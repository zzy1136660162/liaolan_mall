<script>
    const categories = {
        power: {
            title: '电力电缆',

            ]
        },
        control: {
            title: '控制电缆',
            items: [
                { name: '屏蔽控制电缆', desc: '抗电磁干扰，信号精准', tag: 'Shielded' },
                { name: '铠装控制电缆', desc: '耐压耐磨，直埋式安装', tag: 'Armored' },
                { name: '柔性控制电缆', desc: '高频率弯曲作业场景', tag: 'Flexible' }
            ]
        },
        comm: {
            title: '通信电缆',
            items: [
                { name: '光纤光缆', desc: '极速数据传输基石', tag: 'Fiber Optic' },
                { name: '网络数字电缆', desc: 'Cat6e/Cat7 全系列规格', tag: 'Data' },
                { name: '同轴电缆', desc: '广播电视监控传输专用', tag: 'Coaxial' }
            ]
        },
        special: {
            title: '特种电缆',
            items: [
                { name: '船用电缆', desc: '耐盐雾，符合国际航运标准', tag: 'Marine' },
                { name: '矿用电缆', desc: '高强度机械保护及安全性', tag: 'Mining' },
                { name: '高温导线', desc: '硅橡胶、氟塑料耐温材质', tag: 'High Temp' }
            ]
        }
    };

    function switchCategory(key, btn) {
        // Update Sidebar UI
        document.querySelectorAll('.category-btn').forEach(b => {
            b.classList.remove('text-primary', 'font-bold');
            b.classList.add('text-on-surface-variant');
            b.querySelector('div').classList.remove('bg-primary/10');
        });
        btn.classList.add('text-primary', 'font-bold');
        btn.classList.remove('text-on-surface-variant');
        btn.querySelector('div').classList.add('bg-primary/10');

        // Update Content
        const data = categories[key];
        if (!data) return;

        document.getElementById('category-title').textContent = data.title;

        const grid = document.getElementById('category-grid');
        grid.style.opacity = '0';

        setTimeout(() => {
            grid.innerHTML = data.items.map(item => `
                    <div class="group bg-surface-container-lowest border border-outline-variant p-4 rounded-xl hover:border-primary transition-all duration-300 shadow-sm hover:shadow-[0px_10px_20px_-5px_rgba(0,153,255,0.15)] animate-in fade-in slide-in-from-bottom-2">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-tertiary/10 text-tertiary px-2 py-0.5 rounded-full text-label-caps font-label-caps">${item.tag}</span>
                            <span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="arrow_outward">arrow_outward</span>
                        </div>
                        <div class="w-full h-24 flex items-center justify-center mb-4 bg-surface-container-low/30 rounded-lg">
                             <span class="material-symbols-outlined text-primary/30 text-5xl" data-icon="cable">cable</span>
                        </div>
                        <h3 class="font-title-md text-title-md text-on-surface mb-1">${item.name}</h3>
                        <p class="text-on-surface-variant font-body-sm">${item.desc}</p>
                    </div>
                `).join('');
            grid.style.opacity = '1';
        }, 150);
    }
</script>
