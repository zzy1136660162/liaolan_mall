<script>
    // Micro-interaction for filter chips
    const filterBtns = document.querySelectorAll('nav button');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => {
                b.classList.remove('bg-primary', 'text-on-primary');
                b.classList.add('bg-tertiary/10', 'text-tertiary');
            });
            btn.classList.add('bg-primary', 'text-on-primary');
            btn.classList.remove('bg-tertiary/10', 'text-tertiary');
        });
    });

    // Simple scroll reveal effect for cards
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.bento-grid > div').forEach(card => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
        observer.observe(card);
    });
</script>
